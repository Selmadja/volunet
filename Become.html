<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Become.css">
</head>
<body>
  <div class="form-box">
    <h1>JOIN THE MOVEMENT</h1>
    <p>Become a volunteer and make a difference.</p>

    <form>
      <div class="input-group">
        <label>First Name</label>
        <input type="text" placeholder="Enter your name" required>
      </div>

      <div class="input-group">
        <label>Family Name</label>
        <input type="text" placeholder="Enter your name" required>
      </div>

      <div class="input-group">
        <label>Age</label>
  <input 
    type="number" id="age" min="19" required placeholder="Enter your age"
  >
      </div>

      

      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter your phone number" required>
      </div>

<div class="input-group">
        <label>Job Title</label>
        <input type="text" placeholder="Enter your Job Title" required>
      </div>

<div class="input-group">
 <label>City</label>

  <input 
    type="text" 
    name="city"
    placeholder="Enter your city"
    required
  ></div>




<div class="input-group">
        <label>Which field you want to volunteer in ? </label>

  <select id="jobType" required>
    <option value="">Select  Field Type</option>
    <option value="onsite">Onsite  Field</option>
    <option value="online">Online  Field</option>
  </select>
      </div>
<!-- Onsite Jobs List -->
<div class="input-group" id="onsiteJobs" style="display:none;">
  <label>Select an Onsite  Field</label>

  <select>
    <option>Planting</option>
    <option>Animal Care</option>
    <option>Hospital Visits</option>
    <option>Event Organising</option>
    <option>Elderly Support</option>
    <option>Fundraising & Donations</option>
    <option>Clean-Up Campaigns</option>
    <option>Refugee Teaching</option>
    <option>Support Groups</option>
    <option>Mosque Care</option>
    <option>Historical Heritage Preservation</option>
    <option>Sports & Recreation</option>
    <option>First Aid Help</option>
    <option>Disaster Intervention</option>
    <option>Homeless Support</option>
    <option>Disability Care</option>
     </select>
</div>

<!-- Online Jobs List -->
<div class="input-group" id="onlineJobs" style="display:none;">
  <label>Select an Online  Field</label>

  <select>
    <option>Coding</option>
    <option>Graphic Design</option>
    <option>Translation</option>
    <option>Writing</option>
    <option>Online Teaching</option>
    <option>Editing</option>
    <option>Voice Over</option>
    <option>Online Advocacy</option>
    <option>Virtual Events</option>
    <option>Support Calls</option>
    <option>Virtual Assistant</option>
    <option>Fundraising Online Campaigns</option>
  </select>
</div>

<script>
  const jobType = document.getElementById("jobType");
  const onsiteJobs = document.getElementById("onsiteJobs");
  const onlineJobs = document.getElementById("onlineJobs");

  jobType.addEventListener("change", function () {

    if (this.value === "onsite") {
      onsiteJobs.style.display = "block";
      onlineJobs.style.display = "none";
    } 
    
    else if (this.value === "online") {
      onlineJobs.style.display = "block";
      onsiteJobs.style.display = "none";
    } 
    
    else {
      onsiteJobs.style.display = "none";
      onlineJobs.style.display = "none";
    }

  });
</script>


















      <div class="input-group">
        <label>Why do you want to volunteer?</label>
        <textarea placeholder="Write your message..."></textarea>
      </div>

      <button type="submit">Apply Now</button>
      
    </form>
  </div>


</body>
</html>

</body>
</html>
